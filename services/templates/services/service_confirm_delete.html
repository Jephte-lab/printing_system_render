{% extends "base.html" %}
{% block content %}

<h3>Delete Service</h3>

<p>
    Are you sure you want to delete
    <strong>{{ service.name }}</strong>?
</p>

<form method="post">
    {% csrf_token %}
    <button type="submit"
        style="background:#d9534f;color:white;padding:6px 12px;border:none;border-radius:4px;">
        Yes, delete
    </button>
    <a href="{% url 'services_list' %}" style="margin-left:10px;">Cancel</a>
</form>

{% endblock %}
