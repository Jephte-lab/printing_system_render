<h1>{{ action }} Client</h1>

<form method="post">
    {% csrf_token %}
    <label>Name:</label><br>
    <input type="text" name="name" value="{{ client.name|default:'' }}"><br><br>

    <label>Phone:</label><br>
    <input type="text" name="phone" value="{{ client.phone|default:'' }}"><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" value="{{ client.email|default:'' }}"><br><br>

    <button type="submit">{{ action }}</button>
</form>

<p><a href="{% url 'clients_list' %}">Back to Clients List</a></p>
